openapi: 3.1.0
info:
  title: Orders API
  version: 1.1.0
paths:
  /api/orders/{id}:
    get:
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: include_items
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: Order found
          content:
            application/json:
              schema:
                type: object
                required: [id, status]
                properties:
                  id:
                    type: string
                  status:
                    type: string
                  total:
                    type: number
                  estimated_delivery:
                    type: string
        "404":
          description: Order not found
  /api/orders:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customer_id, items]
              properties:
                customer_id:
                  type: string
                items:
                  type: array
                note:
                  type: string
                coupon_code:
                  type: string
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  status:
                    type: string
